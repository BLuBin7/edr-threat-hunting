name: "Credential Dumping - LSASS Memory Access"
description: "Detects suspicious access to LSASS process memory (credential dumping attempt)"
severity: "critical"
category: "credential_access"
enabled: true
score_modifier: 0.95

conditions:
  - field: "path"
    operator: "contains"
    value: "lsass"

  - field: "is_sensitive"
    operator: "eq"
    value: true

mitre:
  tactics:
    - "TA0006 - Credential Access"
  techniques:
    - "T1003.001 - LSASS Memory"

references:
  - "https://attack.mitre.org/techniques/T1003/001/"

response_actions:
  - "IMMEDIATE: Kill the accessing process"
  - "Isolate the endpoint from network"
  - "Capture memory dump for forensics"
  - "Force password reset for all users on this machine"
  - "Check for lateral movement indicators"
